name: Update themes index

on:
  push:
    paths:
      - '**/config.ini'
      - '**/lang/**/desc.ini'
      - '**/theme/images/theme.webp'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run indexer
        run: python update_themes_json.py

      - name: Commit updated themes.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add themes.json
          git diff --cached --quiet || git commit -m "chore: update themes.json [skip ci]"
          git push
